  <!-- text -->
  <text x="190" y="118" font-family="Arial, Helvetica, sans-serif" font-size="22" letter-spacing="6" fill="#FA8A5C" font-weight="700">THE FOUNDRY @ UF</text>
  <text x="188" y="190" font-family="Arial, Helvetica, sans-serif" font-size="76" fill="#FFFFFF" font-weight="800">Engineering Guidelines</text>
  <text x="192" y="236" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#C9D6F2" font-weight="400">Ship production code on real AI &amp; cybersecurity projects.</text>

  <!-- orange base bar -->
  <rect x="0" y="308" width="1200" height="12" fill="url(#spark)"/>
